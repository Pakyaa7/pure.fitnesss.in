<!DOCTYPE html>
<html>
<head>
    <title>Pure Fitness Welcome</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: Arial;
        }

        /* BACKGROUND VIDEO */
        .bg-video {
            position: fixed;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(40%);
        }

        /* CENTER BOX */
        .welcome-box {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 70px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px black;
            animation: fadeIn 2s ease-in-out;
        }

        p {
            font-size: 20px;
            margin-top: 10px;
            opacity: 0.8;
            animation: fadeIn 3s ease-in-out;
        }

      .shayari-box {
    margin-top: 25px;
    padding: 20px;
    max-width: 600px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 15px;
    backdrop-filter: blur(10px);
    color: #000000;
    font-size: 25px;
    line-height: 1.6;
    box-shadow: 0 0 20px rgba(0,255,150,0.2);
    animation: fadeIn 3s ease-in-out;
}


        /* BUTTON */
        .btn {
            margin-top: 19px;
            padding: 12px 25px;
            font-size: 21px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(45deg, #00ff99, #00c3ff);
            color: black;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 0 20px #00ff99;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #00ff99;
        }

        /* ANIMATION */
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(30px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

    <!-- VIDEO BACKGROUND -->
    <video autoplay muted loop class="bg-video">
        <source src="welcome.mp4" type="video/mp4">
    </video>

    <!-- CONTENT -->
    <div class="welcome-box">
        <h1>💪 PURE FITNESS 🏋️‍♂️</h1>
        <p>Transform Your Body. Transform Your Life.</p>

 <div class="shayari-box">
        💪🔥   "घामाच्या प्रत्येक थेंबात यश दडलं आहे,<br>
        मेहनतीच्या प्रत्येक क्षणात स्वप्न फुललं आहे.<br>
        आजचा संघर्ष उद्याचं सामर्थ्य बनेल,<br>
        Pure Fitness मध्ये तुमचं मनापासून स्वागत आहे! 🏋️‍♂️🔥"
    </div>

<br><br>
        <button class="btn" onclick="enterSite()">
            Enter Gym 🚀
        </button>
    </div>

    <script>
        function enterSite(){
            window.location.href = "login page.html";
        }
    </script>

</body>
</html>
